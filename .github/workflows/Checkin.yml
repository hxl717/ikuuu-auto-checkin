name: IKUUU-Auto-Checkin

on:
  workflow_dispatch:
  schedule:
    # 北京时间 07:33
    - cron: "33 23 * * *"

jobs:
  checkin:
    name: Checkin
    runs-on: ubuntu-latest
    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      HOST: ${{ secrets.HOST }}
      PUSH_PLUS_TOKEN: ${{ secrets.PUSH_PLUS_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js latest
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Checkin
        id: checkin
        shell: bash
        run: node main.js

      - name: Notify via PushPlus
        if: always() && env.PUSH_PLUS_TOKEN
        shell: bash
        run: |
          if [ "${{ steps.checkin.outputs.result }}" == "" ]; then
            MSG="签到完成"
          else
            MSG="${{ steps.checkin.outputs.result }}"
          fi
          curl -s -X POST "http://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$PUSH_PLUS_TOKEN\",\"title\":\"iKuuu 自动签到\",\"content\":\"$MSG\"}"